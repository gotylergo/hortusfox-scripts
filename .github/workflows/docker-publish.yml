name: Build and Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    # Runs everyday at 10:00 UTC (2:00 AM PST)
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CORE_IMAGE_NAME: ${{ github.repository_owner }}/hortusfox-core
  SCRIPTS_IMAGE_NAME: ${{ github.repository_owner }}/hortusfox-scripts

jobs:
  build-upstream-image:
    name: Build Upstream HortusFox Core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: danielbrendel/hortusfox-web
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build production assets
        run: |
          npm install
          npm run build --if-present
          npm run prod --if-present
          npm run production --if-present

      # Patch Apache/htaccess for CORS
      # Injects standard headers to prevent cross-origin blocking
      - name: Relax CORS headers
        run: |
          if [ -f public/.htaccess ]; then
            echo -e "\n<IfModule mod_headers.c>\n    Header set Access-Control-Allow-Origin \"*\"\n</IfModule>" >> public/.htaccess
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Core Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.CORE_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-scripts-image:
    name: Build Scripts Sidecar Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.SCRIPTS_IMAGE_NAME }}

      - name: Build and push Scripts Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
