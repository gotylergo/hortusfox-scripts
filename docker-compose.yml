services:
  app:
    image: ghcr.io/gotylergo/hortusfox-core:latest
    container_name: hortusfox
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_TIMEZONE: "America/Los_Angeles"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hortusfox
      DB_USERNAME: hortusfox
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_CHARSET: "utf8mb4"
    volumes:
      - app_images:/var/www/html/public/img
      - app_logs:/var/www/html/app/logs
      - app_backup:/var/www/html/public/backup
      - app_themes:/var/www/html/public/themes
      - app_migrate:/var/www/html/app/migrations
    networks:
      - default
      - proxy

  db:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: hortusfox
      MYSQL_USER: hortusfox
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default

  scripts:
    image: ghcr.io/gotylergo/hortusfox-scripts:main
    container_name: hortusfox-scripts
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - default

volumes:
  db_data:
  app_images:
  app_logs:
  app_backup:
  app_themes:
  app_migrate:


networks:
  default:
  proxy:
    external: true
